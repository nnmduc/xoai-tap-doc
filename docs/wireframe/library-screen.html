<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thư Viện Sách — Xoài Tập Đọc</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700;800&family=Comic+Neue:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --color-bg: #FFF8EE;
      --color-surface: #FFFFFF;
      --color-primary: #4A90D9;
      --color-primary-dark: #2C6FAB;
      --color-accent: #F97316;
      --color-text-primary: #2D2416;
      --color-text-body: #5C4B32;
      --color-text-muted: #9C8468;
      --color-border: #E8D5B0;
      --font-heading: 'Baloo 2', sans-serif;
      --font-body: 'Comic Neue', sans-serif;
      --radius-card: 20px;
      --radius-btn: 16px;
      --ease-bounce: cubic-bezier(0.34, 1.56, 0.64, 1);
      --ease-out: cubic-bezier(0.0, 0.0, 0.2, 1);
    }

    html, body {
      width: 100%; min-height: 100vh;
      background: var(--color-bg);
      font-family: var(--font-body);
      color: var(--color-text-primary);
      overscroll-behavior: none;
    }

    /* ── Background decoration ── */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image:
        radial-gradient(circle 6px at 12% 18%, rgba(74,144,217,.10) 100%, transparent 0),
        radial-gradient(circle 4px at 35% 8%,  rgba(249,115,22,.08) 100%, transparent 0),
        radial-gradient(circle 7px at 72% 14%, rgba(74,144,217,.08) 100%, transparent 0),
        radial-gradient(circle 4px at 88% 6%,  rgba(249,115,22,.10) 100%, transparent 0),
        radial-gradient(circle 5px at 55% 92%, rgba(74,144,217,.08) 100%, transparent 0),
        radial-gradient(circle 6px at 20% 88%, rgba(249,115,22,.07) 100%, transparent 0);
      background-repeat: no-repeat;
    }

    /* ── Layout ── */
    .app {
      position: relative; z-index: 1;
      max-width: 600px; margin: 0 auto;
      min-height: 100vh; display: flex; flex-direction: column;
    }

    /* ── Header ── */
    .header {
      background: linear-gradient(135deg, #4A90D9 0%, #5BA8F0 60%, #67B8F5 100%);
      border-radius: 0 0 28px 28px;
      padding: 28px 24px 22px;
      position: relative; overflow: hidden;
      box-shadow: 0 6px 24px rgba(74,144,217,.35), 0 2px 6px rgba(0,0,0,.08);
      flex-shrink: 0;
    }
    .header::before {
      content: '';
      position: absolute; top: -30px; right: -20px;
      width: 130px; height: 130px;
      background: rgba(255,255,255,.10);
      border-radius: 50%;
    }
    .header::after {
      content: '';
      position: absolute; bottom: -40px; left: -30px;
      width: 100px; height: 100px;
      background: rgba(255,255,255,.07);
      border-radius: 50%;
    }
    .header-inner { position: relative; z-index: 1; }
    .header-title {
      font-family: var(--font-heading);
      font-size: 28px; font-weight: 800; color: #fff;
      letter-spacing: -0.3px; line-height: 1.2;
      display: flex; align-items: center; gap: 10px;
    }
    .header-title-icon {
      width: 36px; height: 36px;
      background: rgba(255,255,255,.22);
      border-radius: 10px; border: 2px solid rgba(255,255,255,.35);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .header-subtitle {
      font-family: var(--font-body);
      font-size: 14px; color: rgba(255,255,255,.88);
      margin-top: 6px; font-weight: 400;
    }
    .header-badge {
      display: inline-flex; align-items: center; gap: 4px;
      margin-top: 10px;
      background: rgba(255,255,255,.20);
      border: 1.5px solid rgba(255,255,255,.30);
      border-radius: 100px; padding: 4px 12px;
      font-family: var(--font-heading); font-size: 12px; font-weight: 600;
      color: rgba(255,255,255,.95);
    }

    /* ── Cloud decorations ── */
    .clouds {
      position: absolute; top: 10px; right: 16px; z-index: 2;
      display: flex; gap: 6px; align-items: flex-start;
    }
    .cloud {
      background: rgba(255,255,255,.22);
      border-radius: 50px; border: 1.5px solid rgba(255,255,255,.30);
    }
    .cloud-sm { width: 28px; height: 16px; margin-top: 8px; }
    .cloud-md { width: 40px; height: 22px; }
    .cloud-lg { width: 32px; height: 18px; margin-top: 4px; }

    /* ── Book grid ── */
    .grid-section {
      padding: 20px 16px 24px;
      flex: 1;
    }
    .grid-label {
      font-family: var(--font-heading);
      font-size: 13px; font-weight: 700; color: var(--color-text-muted);
      text-transform: uppercase; letter-spacing: 0.8px;
      margin-bottom: 14px; padding-left: 2px;
    }
    .book-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }

    /* ── Book card ── */
    .book-card {
      background: var(--color-surface);
      border-radius: var(--radius-card);
      border: 3px solid var(--color-border);
      overflow: hidden; cursor: pointer;
      text-decoration: none; color: inherit;
      display: flex; flex-direction: column;
      box-shadow:
        inset -2px -2px 6px rgba(0,0,0,.06),
        inset 1px 1px 4px rgba(255,255,255,.7),
        4px 6px 18px rgba(74,144,217,.22),
        0 2px 4px rgba(0,0,0,.07);
      transition: transform 220ms var(--ease-bounce), box-shadow 220ms ease-out;
      transform-origin: center bottom;
      /* entrance animation */
      opacity: 0;
      animation: cardEntrance 420ms var(--ease-bounce) forwards;
    }
    .book-card:hover {
      transform: translateY(-6px) scale(1.03);
      box-shadow:
        inset -2px -2px 8px rgba(0,0,0,.08),
        inset 1px 1px 4px rgba(255,255,255,.8),
        6px 12px 28px rgba(74,144,217,.32),
        0 4px 10px rgba(0,0,0,.10);
    }
    .book-card:active {
      transform: translateY(0) scale(0.97);
      transition-duration: 100ms;
    }
    .book-card:nth-child(1) { animation-delay: 60ms; }
    .book-card:nth-child(2) { animation-delay: 120ms; }
    .book-card:nth-child(3) { animation-delay: 180ms; }
    .book-card:nth-child(4) { animation-delay: 240ms; }

    @keyframes cardEntrance {
      from { opacity: 0; transform: translateY(28px) scale(0.90); }
      to   { opacity: 1; transform: translateY(0)   scale(1.00); }
    }

    .book-cover-wrap {
      width: 100%; aspect-ratio: 3/4; overflow: hidden;
      background: linear-gradient(145deg, #e8f4fd 0%, #d4eafc 100%);
      position: relative; flex-shrink: 0;
    }
    .book-cover {
      width: 100%; height: 100%; object-fit: cover;
      display: block;
      transition: transform 300ms ease-out;
    }
    .book-card:hover .book-cover { transform: scale(1.05); }

    .book-cover-placeholder {
      width: 100%; height: 100%;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 8px;
      background: linear-gradient(145deg, #c8e6fa 0%, #a8d4f5 100%);
    }
    .book-cover-placeholder svg { opacity: .5; }
    .book-cover-placeholder span {
      font-family: var(--font-heading); font-size: 11px;
      font-weight: 600; color: rgba(44,111,171,.6);
    }

    .book-info {
      padding: 10px 12px 12px;
      border-top: 2px solid var(--color-border);
    }
    .book-title {
      font-family: var(--font-heading);
      font-size: 15px; font-weight: 700;
      color: var(--color-text-primary);
      line-height: 1.35; margin-bottom: 4px;
      display: -webkit-box;
      -webkit-line-clamp: 2; -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .book-meta {
      display: flex; align-items: center; gap: 5px;
    }
    .book-meta-tag {
      display: inline-flex; align-items: center; gap: 3px;
      background: rgba(74,144,217,.10);
      border: 1.5px solid rgba(74,144,217,.20);
      border-radius: 100px; padding: 2px 8px;
      font-family: var(--font-body); font-size: 11px; font-weight: 700;
      color: var(--color-primary-dark);
    }

    /* ── Incomplete badge ── */
    .book-badge-incomplete {
      position: absolute; top: 8px; right: 8px;
      background: rgba(249,115,22,.88);
      border: 2px solid rgba(255,255,255,.5);
      border-radius: 100px; padding: 2px 8px;
      font-family: var(--font-heading); font-size: 10px; font-weight: 700;
      color: #fff; pointer-events: none;
    }

    /* ── CTA read button overlay on hover ── */
    .book-read-cta {
      position: absolute; inset: 0;
      background: rgba(74,144,217,.0);
      display: flex; align-items: center; justify-content: center;
      opacity: 0;
      transition: opacity 200ms ease-out, background 200ms ease-out;
      border-radius: calc(var(--radius-card) - 3px) calc(var(--radius-card) - 3px) 0 0;
    }
    .book-card:hover .book-read-cta {
      opacity: 1;
      background: rgba(74,144,217,.15);
    }
    .book-read-label {
      background: rgba(74,144,217,.92);
      border: 2px solid rgba(255,255,255,.35);
      border-radius: 100px; padding: 6px 16px;
      font-family: var(--font-heading); font-size: 13px; font-weight: 700;
      color: #fff;
      box-shadow: 0 3px 10px rgba(74,144,217,.45);
    }

    /* ── Footer strip ── */
    .footer {
      padding: 8px 16px 20px;
      display: flex; justify-content: center; align-items: center; gap: 8px;
    }
    .footer-star {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--color-border);
    }
    .footer-star.active { background: var(--color-primary); opacity: .45; }

    /* ── Scroll area ── */
    .scroll-area {
      flex: 1; overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    .scroll-area::-webkit-scrollbar { width: 4px; }
    .scroll-area::-webkit-scrollbar-thumb {
      background: var(--color-border); border-radius: 4px;
    }

    /* ── Bottom safe strip ── */
    .bottom-strip {
      height: env(safe-area-inset-bottom, 0px);
    }

    /* ── Tooltip notice ── */
    .dev-notice {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      background: rgba(45,36,22,.85); color: #fff;
      font-family: var(--font-body); font-size: 12px;
      border-radius: 100px; padding: 7px 18px;
      white-space: nowrap; pointer-events: none;
      animation: noticeIn 400ms 800ms var(--ease-bounce) forwards;
      opacity: 0;
      z-index: 999;
    }
    @keyframes noticeIn {
      from { opacity: 0; transform: translateX(-50%) translateY(16px); }
      to   { opacity: 1; transform: translateX(-50%) translateY(0); }
    }

    @media (prefers-reduced-motion: reduce) {
      .book-card { animation: none; opacity: 1; }
      .book-card:hover { transform: none; }
      .book-cover { transition: none; }
      .dev-notice { animation: none; opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="app">
    <!-- Header -->
    <header class="header">
      <div class="clouds">
        <div class="cloud cloud-sm"></div>
        <div class="cloud cloud-md"></div>
        <div class="cloud cloud-lg"></div>
      </div>
      <div class="header-inner">
        <div class="header-title">
          <div class="header-title-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
              <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
            </svg>
          </div>
          Thư Viện Sách
        </div>
        <p class="header-subtitle">Chọn một cuốn sách để đọc nhé!</p>
        <div class="header-badge">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
          3 câu chuyện
        </div>
      </div>
    </header>

    <!-- Scroll area -->
    <div class="scroll-area">
      <section class="grid-section">
        <p class="grid-label">Tất cả sách</p>
        <div class="book-grid" id="bookGrid">

          <!-- Book 1: canh-cua-trong-tu-sach -->
          <a class="book-card"
             href="reader-screen.html?slug=canh-cua-trong-tu-sach&title=C%C3%A1nh+C%E1%BB%ADa+Trong+T%E1%BB%A7+S%C3%A1ch"
             role="button"
             aria-label="Đọc truyện Cánh Cửa Trong Tủ Sách">
            <div class="book-cover-wrap">
              <img
                class="book-cover"
                src="../../assets/generated-story-images/canh-cua-trong-tu-sach/cover/cover.png"
                alt="Bìa sách: Cánh Cửa Trong Tủ Sách"
                onerror="this.parentElement.innerHTML='<div class=\'book-cover-placeholder\'><svg width=\'40\' height=\'40\' viewBox=\'0 0 24 24\' fill=\'none\' stroke=\'#4A90D9\' stroke-width=\'1.5\'><path d=\'M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z\'/><path d=\'M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z\'/></svg><span>Đang tải...</span></div>'"
              />
              <div class="book-read-cta" aria-hidden="true">
                <span class="book-read-label">Đọc ngay!</span>
              </div>
            </div>
            <div class="book-info">
              <p class="book-title">Cánh Cửa Trong Tủ Sách</p>
              <div class="book-meta">
                <span class="book-meta-tag">
                  <svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
                  Lớp 1
                </span>
              </div>
            </div>
          </a>

          <!-- Book 2: duong-sao-tren-san-thuong -->
          <a class="book-card"
             href="reader-screen.html?slug=duong-sao-tren-san-thuong&title=%C4%90%C6%B0%E1%BB%9Dng+Sao+Tr%C3%AAn+S%C3%A2n+Th%C6%B0%E1%BB%A3ng"
             role="button"
             aria-label="Đọc truyện Đường Sao Trên Sân Thượng">
            <div class="book-cover-wrap">
              <img
                class="book-cover"
                src="../../assets/generated-story-images/duong-sao-tren-san-thuong/cover/cover.png"
                alt="Bìa sách: Đường Sao Trên Sân Thượng"
                onerror="this.parentElement.innerHTML='<div class=\'book-cover-placeholder\'><svg width=\'40\' height=\'40\' viewBox=\'0 0 24 24\' fill=\'none\' stroke=\'#4A90D9\' stroke-width=\'1.5\'><path d=\'M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z\'/><path d=\'M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z\'/></svg><span>Đang tải...</span></div>'"
              />
              <div class="book-read-cta" aria-hidden="true">
                <span class="book-read-label">Đọc ngay!</span>
              </div>
            </div>
            <div class="book-info">
              <p class="book-title">Đường Sao Trên Sân Thượng</p>
              <div class="book-meta">
                <span class="book-meta-tag">
                  <svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
                  Lớp 1
                </span>
              </div>
            </div>
          </a>

          <!-- Book 3: ban-do-trong-san-truong (no HTML book yet) -->
          <a class="book-card"
             href="reader-screen.html?slug=ban-do-trong-san-truong&title=B%E1%BA%A3n+%C4%90%E1%BB%93+Trong+S%C3%A2n+Tr%C6%B0%E1%BB%9Dng"
             role="button"
             aria-label="Đọc truyện Bản Đồ Trong Sân Trường">
            <div class="book-cover-wrap" style="position:relative;">
              <img
                class="book-cover"
                src="../../assets/generated-story-images/ban-do-trong-san-truong/cover/cover.png"
                alt="Bìa sách: Bản Đồ Trong Sân Trường"
                onerror="this.parentElement.innerHTML='<div class=\'book-cover-placeholder\'><svg width=\'40\' height=\'40\' viewBox=\'0 0 24 24\' fill=\'none\' stroke=\'#4A90D9\' stroke-width=\'1.5\'><path d=\'M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z\'/><path d=\'M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z\'/></svg><span>Đang tải...</span></div>'"
              />
              <span class="book-badge-incomplete">Sắp có</span>
              <div class="book-read-cta" aria-hidden="true">
                <span class="book-read-label">Đọc ngay!</span>
              </div>
            </div>
            <div class="book-info">
              <p class="book-title">Bản Đồ Trong Sân Trường</p>
              <div class="book-meta">
                <span class="book-meta-tag">
                  <svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
                  Lớp 1
                </span>
              </div>
            </div>
          </a>

          <!-- Placeholder card 4 — coming soon -->
          <div class="book-card" style="opacity:.45; cursor:default; pointer-events:none;" aria-hidden="true">
            <div class="book-cover-wrap">
              <div class="book-cover-placeholder">
                <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#4A90D9" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M12 5v14M5 12h14"/>
                </svg>
                <span>Thêm sách</span>
              </div>
            </div>
            <div class="book-info">
              <p class="book-title" style="color:var(--color-text-muted)">Sắp ra mắt...</p>
              <div class="book-meta">
                <span class="book-meta-tag" style="opacity:.6">Lớp 1</span>
              </div>
            </div>
          </div>

        </div>
      </section>

      <!-- Footer -->
      <footer class="footer">
        <div class="footer-star active"></div>
        <div class="footer-star active"></div>
        <div class="footer-star active"></div>
        <div class="footer-star"></div>
        <div class="footer-star"></div>
      </footer>
      <div class="bottom-strip"></div>
    </div>
  </div>

  <div class="dev-notice" role="status">Nhấn vào sách để đọc ✨</div>

  <script>
    // Persist last scroll position
    const SCROLL_KEY = 'library-scroll';
    const scroll = document.querySelector('.scroll-area');
    scroll.scrollTop = Number(sessionStorage.getItem(SCROLL_KEY) || 0);
    scroll.addEventListener('scroll', () => {
      sessionStorage.setItem(SCROLL_KEY, scroll.scrollTop);
    }, { passive: true });

    // Auto-hide dev notice
    const notice = document.querySelector('.dev-notice');
    setTimeout(() => {
      notice.style.transition = 'opacity 600ms ease-out';
      notice.style.opacity = '0';
    }, 3500);

    // Keyboard navigation for card links
    document.querySelectorAll('.book-card').forEach(card => {
      card.addEventListener('keydown', e => {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          card.click();
        }
      });
    });
  </script>
</body>
</html>
