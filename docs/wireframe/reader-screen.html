<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Đọc Sách — Xoài Tập Đọc</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700;800&family=Comic+Neue:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --color-bg: #FFF8EE;
      --color-surface: #FFFFFF;
      --color-primary: #4A90D9;
      --color-primary-dark: #2C6FAB;
      --color-accent: #F97316;
      --color-text-primary: #2D2416;
      --color-text-body: #5C4B32;
      --color-text-muted: #9C8468;
      --color-border: #E8D5B0;
      --color-frame-wood: #8B5E3C;
      --color-frame-wood-mid: #A0703A;
      --color-frame-wood-light: #C4874A;
      --color-frame-wood-grain: #7A5234;
      --font-heading: 'Baloo 2', sans-serif;
      --font-body: 'Comic Neue', sans-serif;
      --ease-bounce: cubic-bezier(0.34, 1.56, 0.64, 1);
      --ease-out: cubic-bezier(0.0, 0.0, 0.2, 1);
    }

    html, body {
      width: 100%; height: 100%; overflow: hidden;
      background: var(--color-bg);
      font-family: var(--font-body);
      color: var(--color-text-primary);
    }

    /* ── Full-screen layout ── */
    .reader-screen {
      width: 100%; height: 100%;
      display: flex; flex-direction: column;
      animation: slideUp 420ms var(--ease-out) forwards;
    }
    @keyframes slideUp {
      from { transform: translateY(60px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }

    /* ── Top bar ── */
    .top-bar {
      height: 60px; flex-shrink: 0;
      background: var(--color-surface);
      border-bottom: 2px solid var(--color-border);
      display: flex; align-items: center;
      padding: 0 12px; gap: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,.07);
      position: relative; z-index: 10;
    }

    .back-btn {
      width: 44px; height: 44px; flex-shrink: 0;
      background: var(--color-bg);
      border: 2.5px solid var(--color-border);
      border-radius: 13px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; text-decoration: none; color: var(--color-text-primary);
      box-shadow: 3px 3px 8px rgba(74,144,217,.18), inset 1px 1px 3px rgba(255,255,255,.8);
      transition: transform 150ms var(--ease-bounce), box-shadow 150ms ease-out,
                  background 150ms ease-out, border-color 150ms ease-out;
      -webkit-tap-highlight-color: transparent;
    }
    .back-btn:hover {
      background: #EDF5FF;
      border-color: var(--color-primary);
      box-shadow: 3px 4px 12px rgba(74,144,217,.28), inset 1px 1px 3px rgba(255,255,255,.9);
    }
    .back-btn:active {
      transform: scale(0.92);
      box-shadow: 1px 2px 4px rgba(74,144,217,.15);
    }
    .back-btn svg {
      width: 20px; height: 20px;
      stroke: var(--color-primary); stroke-width: 2.5;
    }

    .top-bar-content {
      flex: 1; min-width: 0;
      display: flex; flex-direction: column; gap: 1px;
    }
    .top-bar-label {
      font-family: var(--font-body); font-size: 10px; font-weight: 700;
      color: var(--color-text-muted); text-transform: uppercase; letter-spacing: .6px;
    }
    .top-bar-title {
      font-family: var(--font-heading); font-size: 16px; font-weight: 700;
      color: var(--color-text-primary); white-space: nowrap;
      overflow: hidden; text-overflow: ellipsis; line-height: 1.2;
    }

    .top-bar-page-indicator {
      flex-shrink: 0; display: flex; align-items: center; gap: 4px;
    }
    .page-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--color-border);
      transition: background 200ms ease;
    }
    .page-dot.active { background: var(--color-primary); }

    /* ── Frame area ── */
    .frame-area {
      flex: 1; min-height: 0;
      padding: 14px 14px 10px;
      display: flex; flex-direction: column;
      background:
        radial-gradient(ellipse 120% 60% at 50% 0%,  rgba(74,144,217,.06) 0%, transparent 70%),
        var(--color-bg);
    }

    /* ── Wooden outer frame ── */
    .wood-frame {
      flex: 1; min-height: 0;
      border-radius: 18px; overflow: hidden;
      position: relative;
      /* Wood grain base */
      background: var(--color-frame-wood);
      /* Layered box-shadows for depth */
      box-shadow:
        inset 0 0 0 3px var(--color-frame-wood-light),
        inset 0 0 0 5px var(--color-frame-wood-grain),
        0 6px 24px rgba(139,94,60,.35),
        0 2px 6px rgba(0,0,0,.15),
        0 -2px 0 rgba(255,255,255,.12);
    }

    /* Wood grain texture overlay */
    .wood-frame::before {
      content: '';
      position: absolute; inset: 0; z-index: 1; pointer-events: none; border-radius: 18px;
      background:
        /* Grain lines horizontal */
        repeating-linear-gradient(
          180deg,
          transparent 0px,
          transparent 6px,
          rgba(101,62,30,.12) 6px,
          rgba(101,62,30,.12) 7px
        ),
        /* Grain lines slight diagonal */
        repeating-linear-gradient(
          175deg,
          transparent 0px,
          transparent 22px,
          rgba(196,135,74,.08) 22px,
          rgba(196,135,74,.08) 23px
        ),
        /* Top highlight bevel */
        linear-gradient(180deg, rgba(255,255,255,.18) 0%, transparent 12px),
        /* Bottom shadow bevel */
        linear-gradient(0deg, rgba(0,0,0,.18) 0%, transparent 12px),
        /* Left highlight bevel */
        linear-gradient(90deg, rgba(255,255,255,.12) 0%, transparent 12px),
        /* Right shadow bevel */
        linear-gradient(270deg, rgba(0,0,0,.12) 0%, transparent 12px);
    }

    /* Wood frame corner ornaments */
    .wood-frame::after {
      content: '';
      position: absolute; inset: 4px; z-index: 2; pointer-events: none;
      border-radius: 14px;
      border: 2px solid rgba(255,255,255,.15);
      box-shadow: inset 0 0 0 1px rgba(0,0,0,.10);
    }

    /* Corner decorations (pure CSS stars) */
    .corner { position: absolute; z-index: 5; pointer-events: none; }
    .corner-tl { top: 5px; left: 5px; }
    .corner-tr { top: 5px; right: 5px; transform: scaleX(-1); }
    .corner-bl { bottom: 5px; left: 5px; transform: scaleY(-1); }
    .corner-br { bottom: 5px; right: 5px; transform: scale(-1,-1); }
    .corner svg { width: 20px; height: 20px; opacity: .55; }

    /* ── Inner white mat ── */
    .wood-inner {
      position: absolute; inset: 10px; z-index: 3;
      border-radius: 10px; overflow: hidden;
      background: #fff;
      box-shadow: inset 0 0 12px rgba(139,94,60,.15);
    }

    /* ── iframe ── */
    .story-iframe {
      width: 100%; height: 100%; border: none; display: block;
      border-radius: 10px;
    }

    /* ── Coming-soon fallback ── */
    .fallback {
      display: none;
      width: 100%; height: 100%;
      align-items: center; justify-content: center;
      flex-direction: column; gap: 16px;
      text-align: center; padding: 32px;
      background: linear-gradient(145deg, #FFF8EE 0%, #FFF0D8 100%);
    }
    .fallback-icon {
      width: 72px; height: 72px;
      background: rgba(74,144,217,.10);
      border: 3px solid rgba(74,144,217,.20);
      border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
    }
    .fallback-icon svg { stroke: var(--color-primary); }
    .fallback h2 {
      font-family: var(--font-heading); font-size: 20px; font-weight: 800;
      color: var(--color-text-primary);
    }
    .fallback p {
      font-family: var(--font-body); font-size: 15px;
      color: var(--color-text-body); line-height: 1.6; max-width: 240px;
    }
    .fallback-btn {
      display: inline-flex; align-items: center; gap: 8px;
      background: var(--color-primary);
      border: 3px solid var(--color-primary-dark);
      border-radius: 100px; padding: 12px 24px;
      font-family: var(--font-heading); font-size: 15px; font-weight: 700;
      color: #fff; text-decoration: none; cursor: pointer;
      box-shadow: 3px 4px 12px rgba(74,144,217,.35);
      transition: transform 150ms var(--ease-bounce), box-shadow 150ms ease-out;
    }
    .fallback-btn:hover {
      transform: translateY(-2px);
      box-shadow: 4px 6px 18px rgba(74,144,217,.45);
    }
    .fallback-btn:active { transform: scale(0.96); }

    /* ── Loading overlay ── */
    .iframe-loading {
      position: absolute; inset: 0; z-index: 10;
      background: var(--color-bg);
      display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 16px;
      border-radius: 10px;
      transition: opacity 300ms ease-out;
    }
    .spinner {
      width: 44px; height: 44px;
      border: 4px solid var(--color-border);
      border-top-color: var(--color-primary);
      border-radius: 50%;
      animation: spin 700ms linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text {
      font-family: var(--font-heading); font-size: 14px; font-weight: 600;
      color: var(--color-text-muted);
    }

    /* ── Safe area bottom ── */
    .bottom-safe { height: env(safe-area-inset-bottom, 4px); flex-shrink: 0; }

    @media (prefers-reduced-motion: reduce) {
      .reader-screen { animation: none; }
      .spinner { animation: none; }
      .back-btn, .fallback-btn { transition: none; }
    }
  </style>
</head>
<body>
  <div class="reader-screen">

    <!-- Top bar -->
    <header class="top-bar">
      <a class="back-btn" href="library-screen.html" aria-label="Quay lại thư viện">
        <svg viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </a>

      <div class="top-bar-content">
        <span class="top-bar-label">Thư Viện Sách</span>
        <h1 class="top-bar-title" id="barTitle">Đang tải...</h1>
      </div>

      <div class="top-bar-page-indicator" aria-label="Tiến độ đọc" id="pageIndicator">
        <div class="page-dot active"></div>
        <div class="page-dot"></div>
        <div class="page-dot"></div>
      </div>
    </header>

    <!-- Frame area -->
    <div class="frame-area">
      <div class="wood-frame" id="woodFrame">

        <!-- Corner ornaments -->
        <div class="corner corner-tl">
          <svg viewBox="0 0 20 20" fill="none">
            <circle cx="4" cy="4" r="3" fill="rgba(255,255,255,.55)" stroke="rgba(255,255,255,.35)" stroke-width="1"/>
            <line x1="7" y1="4" x2="18" y2="4" stroke="rgba(255,255,255,.30)" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="4" y1="7" x2="4" y2="18" stroke="rgba(255,255,255,.30)" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </div>
        <div class="corner corner-tr">
          <svg viewBox="0 0 20 20" fill="none">
            <circle cx="4" cy="4" r="3" fill="rgba(255,255,255,.55)" stroke="rgba(255,255,255,.35)" stroke-width="1"/>
            <line x1="7" y1="4" x2="18" y2="4" stroke="rgba(255,255,255,.30)" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="4" y1="7" x2="4" y2="18" stroke="rgba(255,255,255,.30)" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </div>
        <div class="corner corner-bl">
          <svg viewBox="0 0 20 20" fill="none">
            <circle cx="4" cy="4" r="3" fill="rgba(255,255,255,.55)" stroke="rgba(255,255,255,.35)" stroke-width="1"/>
            <line x1="7" y1="4" x2="18" y2="4" stroke="rgba(255,255,255,.30)" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="4" y1="7" x2="4" y2="18" stroke="rgba(255,255,255,.30)" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </div>
        <div class="corner corner-br">
          <svg viewBox="0 0 20 20" fill="none">
            <circle cx="4" cy="4" r="3" fill="rgba(255,255,255,.55)" stroke="rgba(255,255,255,.35)" stroke-width="1"/>
            <line x1="7" y1="4" x2="18" y2="4" stroke="rgba(255,255,255,.30)" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="4" y1="7" x2="4" y2="18" stroke="rgba(255,255,255,.30)" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </div>

        <!-- Inner mat with iframe -->
        <div class="wood-inner" id="woodInner">

          <!-- Loading overlay -->
          <div class="iframe-loading" id="loadingOverlay">
            <div class="spinner"></div>
            <p class="loading-text">Đang mở sách...</p>
          </div>

          <!-- Story iframe -->
          <iframe
            id="storyFrame"
            class="story-iframe"
            title="Đọc truyện"
            sandbox="allow-scripts allow-same-origin"
            loading="lazy"
          ></iframe>

          <!-- Fallback for books without rendered HTML -->
          <div class="fallback" id="fallback" role="status">
            <div class="fallback-icon">
              <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
                <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
              </svg>
            </div>
            <h2>Sách chưa sẵn sàng</h2>
            <p id="fallbackMsg">Cuốn sách này chưa được tạo xong. Hãy quay lại sau nhé!</p>
            <a class="fallback-btn" href="library-screen.html">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="15 18 9 12 15 6"/>
              </svg>
              Quay lại thư viện
            </a>
          </div>

        </div><!-- /wood-inner -->
      </div><!-- /wood-frame -->
    </div><!-- /frame-area -->

    <div class="bottom-safe"></div>
  </div>

  <script>
    (function () {
      // Parse URL params
      const params = new URLSearchParams(location.search);
      const slug  = params.get('slug')  || '';
      const title = params.get('title') || 'Đọc Sách';

      // Populate top bar
      document.getElementById('barTitle').textContent = title;
      document.title = title + ' — Xoài Tập Đọc';

      const iframe   = document.getElementById('storyFrame');
      const loading  = document.getElementById('loadingOverlay');
      const fallback = document.getElementById('fallback');
      const fallbackMsg = document.getElementById('fallbackMsg');

      if (!slug) {
        // No slug — show fallback immediately
        showFallback('Không tìm thấy truyện. Vui lòng chọn sách từ thư viện.');
        return;
      }

      // Books that have a rendered HTML (extend this list as pipeline completes)
      const readyBooks = ['canh-cua-trong-tu-sach', 'duong-sao-tren-san-thuong'];

      if (!readyBooks.includes(slug)) {
        showFallback('Cuốn sách này chưa được tạo xong. Hãy quay lại sau nhé!');
        return;
      }

      // Load book into iframe
      const bookPath = '../../assets/generated-story-books/' + slug + '/index.html';
      iframe.src = bookPath;

      iframe.addEventListener('load', () => {
        loading.style.opacity = '0';
        setTimeout(() => { loading.style.display = 'none'; }, 310);
      });

      // Fallback if load fails after 8s
      const timeout = setTimeout(() => {
        if (loading.style.display !== 'none') {
          showFallback('Không thể tải sách. Vui lòng kiểm tra lại và thử lại.');
        }
      }, 8000);

      iframe.addEventListener('load', () => clearTimeout(timeout));

      function showFallback(msg) {
        iframe.style.display = 'none';
        loading.style.display = 'none';
        fallbackMsg.textContent = msg;
        fallback.style.display  = 'flex';
      }
    })();
  </script>
</body>
</html>
