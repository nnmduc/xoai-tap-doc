<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Warm cream background -->
  <rect width="64" height="64" rx="16" fill="#FFF4DE"/>

  <!-- Mango body -->
  <ellipse cx="32" cy="39" rx="17" ry="20" fill="#F97316"/>

  <!-- Yellow sun-side highlight -->
  <ellipse cx="26" cy="33" rx="8" ry="11" fill="#FDD649" opacity="0.8"/>

  <!-- Stem -->
  <path d="M32 19 Q31 15 33 13" stroke="#7C6A2A" stroke-width="3" stroke-linecap="round" fill="none"/>

  <!-- Leaf -->
  <ellipse cx="43" cy="11" rx="11" ry="4.5" fill="#5AB535" transform="rotate(-22 43 11)"/>
  <!-- Leaf vein -->
  <path d="M33 14 Q38 11 45 10" stroke="#3D8A22" stroke-width="1.2" fill="none" stroke-linecap="round"/>

  <!-- Eyes -->
  <circle cx="27" cy="38" r="2.5" fill="#1A0A00"/>
  <circle cx="37" cy="38" r="2.5" fill="#1A0A00"/>
  <!-- Eye shine -->
  <circle cx="28.2" cy="36.8" r="0.9" fill="white"/>
  <circle cx="38.2" cy="36.8" r="0.9" fill="white"/>

  <!-- Smile -->
  <path d="M25 46 Q32 53 39 46" stroke="#1A0A00" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
